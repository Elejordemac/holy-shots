<svg viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="500">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="50%" stop-color="#44318d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C5A044"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg3)"/>
  
  <!-- Abstract shapes -->
  <circle cx="200" cy="250" r="180" fill="#C5A044" opacity="0.08"/>
  <circle cx="1000" cy="250" r="200" fill="#C5A044" opacity="0.06"/>
  <circle cx="600" cy="450" r="120" fill="#D4B66A" opacity="0.05"/>
  
  <!-- Diagonal gold stripe -->
  <path d="M0 350 L400 0 L500 0 L100 350 Z" fill="url(#goldAccent)" opacity="0.1"/>
  <path d="M700 500 L1100 150 L1200 150 L800 500 Z" fill="url(#goldAccent)" opacity="0.1"/>
  
  <!-- Center content -->
  <text x="600" y="160" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#D4B66A" letter-spacing="5">HOLY SHOTS</text>
  
  <text x="600" y="230" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="bold" fill="white">Book Now, Shoot</text>
  <text x="600" y="290" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="bold" fill="#E8D48B">Tomorrow</text>
  
  <text x="600" y="340" text-anchor="middle" font-family="system-ui" font-size="20" fill="rgba(255,255,255,0.7)">Easy booking • Fast pickup • Affordable rates</text>
  
  <!-- CTA Button -->
  <rect x="475" y="370" width="250" height="55" rx="28" fill="url(#goldAccent)"/>
  <text x="600" y="405" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#1a1a2e">Reserve Equipment</text>
  
  <!-- Corner decorations -->
  <path d="M0 0 L80 0 L0 80 Z" fill="#C5A044" opacity="0.3"/>
  <path d="M1200 500 L1120 500 L1200 420 Z" fill="#C5A044" opacity="0.3"/>
  
  <!-- Star/sparkle elements -->
  <path d="M100 400 L108 415 L100 430 L92 415 Z" fill="#E8D48B" opacity="0.5"/>
  <path d="M1100 80 L1108 95 L1100 110 L1092 95 Z" fill="#E8D48B" opacity="0.5"/>
  <path d="M300 60 L306 72 L300 84 L294 72 Z" fill="#D4B66A" opacity="0.4"/>
  <path d="M900 440 L906 452 L900 464 L894 452 Z" fill="#D4B66A" opacity="0.4"/>
  
  <!-- Small camera icons -->
  <rect x="80" y="180" width="60" height="40" rx="8" fill="white" opacity="0.1"/>
  <circle cx="110" cy="200" r="12" fill="white" opacity="0.1"/>
  <rect x="1060" y="300" width="60" height="40" rx="8" fill="white" opacity="0.1"/>
  <circle cx="1090" cy="320" r="12" fill="white" opacity="0.1"/>
</svg>
