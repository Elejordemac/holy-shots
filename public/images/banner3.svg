<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="50%" stop-color="#44318d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="goldAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C5A044"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>

  <!-- Abstract shapes -->
  <circle cx="150" cy="200" r="120" fill="#C5A044" opacity="0.04"/>
  <circle cx="650" cy="200" r="130" fill="#C5A044" opacity="0.04"/>

  <!-- Diagonal stripes -->
  <path d="M0 280 L250 0 L310 0 L60 280 Z" fill="url(#goldAcc)" opacity="0.06"/>
  <path d="M490 400 L740 120 L800 120 L550 400 Z" fill="url(#goldAcc)" opacity="0.06"/>

  <!-- Content tightly centered -->
  <text x="400" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#D4B66A" letter-spacing="4">HOLY SHOTS</text>

  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white">Book Now, Shoot</text>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#E8D48B">Tomorrow</text>

  <text x="400" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Easy booking • Fast pickup • Affordable rates</text>

  <!-- Corner decorations -->
  <path d="M0 0 L50 0 L0 50 Z" fill="#C5A044" opacity="0.2"/>
  <path d="M800 400 L750 400 L800 350 Z" fill="#C5A044" opacity="0.2"/>

  <!-- Sparkles -->
  <path d="M100 300 L105 310 L100 320 L95 310 Z" fill="#E8D48B" opacity="0.35"/>
  <path d="M700 90 L705 100 L700 110 L695 100 Z" fill="#E8D48B" opacity="0.35"/>
</svg>
