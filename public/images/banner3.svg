  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>

  <!-- Abstract shapes -->
  <circle cx="150" cy="200" r="120" fill="#C5A044" opacity="0.04"/>
  <circle cx="650" cy="200" r="130" fill="#C5A044" opacity="0.04"/>

