<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="bodyGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B66A"/>
      <stop offset="100%" stop-color="#A6852E"/>
    </linearGradient>
    <linearGradient id="lensGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0E0A0"/>
      <stop offset="100%" stop-color="#A6852E"/>
    </linearGradient>
    <radialGradient id="glass1" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="#C5A044" opacity="0.06"/>
  <circle cx="700" cy="320" r="50" fill="#C5A044" opacity="0.06"/>

  <!-- Halo - centered -->
  <path d="M355 115 C355 92, 445 92, 445 115" stroke="#E8D48B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Camera body - centered at y ~155 -->
  <rect x="335" y="120" width="130" height="90" rx="14" fill="url(#bodyGrad1)"/>
  <rect x="335" y="120" width="130" height="4" rx="2" fill="#E8D48B" opacity="0.5"/>
  <!-- Viewfinder -->
  <rect x="372" y="105" width="56" height="20" rx="8" fill="#A6852E"/>
  <!-- Shutter -->
  <circle cx="418" cy="112" r="5" fill="#E8D48B"/>
  <!-- Lens outer -->
  <circle cx="400" cy="168" r="32" fill="none" stroke="url(#lensGrad1)" stroke-width="3.5"/>
  <!-- Lens body -->
  <circle cx="400" cy="168" r="27" fill="#0D0D0D"/>
  <circle cx="400" cy="168" r="20" fill="none" stroke="#333" stroke-width="0.7"/>
  <circle cx="400" cy="168" r="13" fill="url(#glass1)"/>
  <!-- Reflection -->
  <ellipse cx="394" cy="162" rx="4" ry="3" fill="white" opacity="0.2"/>
  <!-- Bottom accent -->
  <rect x="372" y="202" width="56" height="3" rx="1.5" fill="#E8D48B" opacity="0.6"/>

  <!-- Text - centered below camera -->
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="white">Premium Camera Rentals</text>
  <text x="400" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#D4B66A" font-style="italic">Capture moments that matter</text>

  <!-- Sparkles -->
  <path d="M185 165 L190 175 L185 185 L180 175 Z" fill="#E8D48B" opacity="0.4"/>
  <path d="M615 155 L620 165 L615 175 L610 165 Z" fill="#E8D48B" opacity="0.4"/>
  <path d="M250 250 L254 258 L250 266 L246 258 Z" fill="#D4B66A" opacity="0.3"/>
  <path d="M560 245 L564 253 L560 261 L556 253 Z" fill="#D4B66A" opacity="0.3"/>
</svg>
