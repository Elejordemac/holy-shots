<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="bodyGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B66A"/>
      <stop offset="100%" stop-color="#A6852E"/>
    </linearGradient>
    <linearGradient id="lensGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0E0A0"/>
      <stop offset="100%" stop-color="#A6852E"/>
    </linearGradient>
    <radialGradient id="glass1" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="#C5A044" opacity="0.06"/>
  <circle cx="700" cy="320" r="50" fill="#C5A044" opacity="0.06"/>

  <!-- Halo -->
  <path d="M350 85 C350 60, 450 60, 450 85" stroke="#E8D48B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Camera body -->
  <rect x="330" y="95" width="140" height="95" rx="16" fill="url(#bodyGrad1)"/>
  <rect x="330" y="95" width="140" height="4" rx="2" fill="#E8D48B" opacity="0.5"/>
  <!-- Viewfinder -->
  <rect x="370" y="78" width="60" height="22" rx="8" fill="#A6852E"/>
  <!-- Shutter -->
  <circle cx="420" cy="86" r="6" fill="#E8D48B"/>
  <!-- Lens outer -->
  <circle cx="400" cy="145" r="35" fill="none" stroke="url(#lensGrad1)" stroke-width="4"/>
  <!-- Lens body -->
  <circle cx="400" cy="145" r="30" fill="#0D0D0D"/>
  <circle cx="400" cy="145" r="22" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="400" cy="145" r="15" fill="url(#glass1)"/>
  <!-- Reflection -->
  <ellipse cx="393" cy="138" rx="5" ry="4" fill="white" opacity="0.2"/>
  <!-- Bottom accent -->
  <rect x="370" y="182" width="60" height="3" rx="1.5" fill="#E8D48B" opacity="0.6"/>

  <!-- Text -->
  <text x="400" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white">Premium Camera Rentals</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#D4B66A" font-style="italic">Capture moments that matter</text>

  <!-- Sparkles -->
  <path d="M180 140 L185 150 L180 160 L175 150 Z" fill="#E8D48B" opacity="0.4"/>
  <path d="M620 120 L625 130 L620 140 L615 130 Z" fill="#E8D48B" opacity="0.4"/>
  <path d="M250 300 L254 308 L250 316 L246 308 Z" fill="#D4B66A" opacity="0.3"/>
  <path d="M580 280 L584 288 L580 296 L576 288 Z" fill="#D4B66A" opacity="0.3"/>
</svg>
