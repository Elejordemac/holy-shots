  <rect x="650" y="430" width="460" height="35" rx="5" fill="white" opacity="0.12"/>
  <rect x="670" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="705" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="740" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="775" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="810" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="845" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="880" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="915" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="950" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="985" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
  <rect x="1020" y="435" width="25" height="25" rx="3" fill="white" opacity="0.15"/>
